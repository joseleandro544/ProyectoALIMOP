image: docker:20.10.16
services:
  - docker:20.10.16-dind

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  DOCKER_IMAGE_FRONTEND: docker.io/joseleandro14/alimop-frontend
  DOCKER_IMAGE_BACKEND: docker.io/joseleandro14/alimop-backend

stages:
  - build-docker
  - deploy-pages

# Etapa 1: Construir y subir contenedores a Docker Hub
build_containers:
  stage: build-docker
  before_script:
    # Estas variables deben configurarse en GitLab -> Settings -> CI/CD -> Variables
    - echo "Iniciando sesión en Docker Hub con usuario joseleandro14..."
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
  script:
    - echo "Compilando imagen del Frontend Nginx..."
    - docker build -t $DOCKER_IMAGE_FRONTEND:latest ./frontend
    - echo "Compilando imagen del Backend Node.js..."
    - docker build -t $DOCKER_IMAGE_BACKEND:latest ./backend
    - echo "Subiendo imágenes a Docker Hub..."
    - docker push $DOCKER_IMAGE_FRONTEND:latest
    - docker push $DOCKER_IMAGE_BACKEND:latest
  only:
    - main
    - master

# Etapa 2: Desplegar la visualización en GitLab Pages
pages:
  image: node:18-alpine
  stage: deploy-pages
  script:
    - echo "Preparando despliegue de UI estática para GitLab Pages..."
    - cd frontend
    - npm install
    - npm run build -- --base=/ProyectoALIMOP/
    - cd ..
    - mkdir -p public
    - cp -r frontend/dist/* public/
  artifacts:
    paths:
      - public
  only:
    - main
    - master
